<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Response Pending</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <style>
    /* General Styles */
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Chart Container with Gradient Background */
    #chart_container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 15px;
      border-radius: 10px;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb); /* Lighter blue gradient */
      box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2); /* Soft shadow */
      width: 460px;
      box-sizing: border-box;
    }

    /* Chart Title Styling */
    .chart-title {
      font-family: "Aptos Bold", Arial, sans-serif;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      text-transform: uppercase;
      color: #006064;
    }

    /* White Chart Area */
    #main {
      width: 430px;
      height: 250px;
      background: #ffffff; /* White chart area background */
      border-radius: 4px;
      padding: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div id="chart_container">
    <div class="chart-title">DELIVERY RESPONSE PENDING</div>
    <div id="main"></div>
  </div>

  <script>
    var chartDom = document.getElementById('main');
    var myChart = echarts.init(chartDom);
    var option = {
      tooltip: {
        trigger: 'axis',
        axisPointer: {
          type: 'shadow'
        }
      },
      grid: {
        top: '12%',
        left: '8%',
        right: '5%',
        bottom: '12%',
        containLabel: true
      },
      xAxis: {
        type: 'category',
        data: ['1 to 3 days', '4 to 8 days', '8 to 15 days', '> 15 days'],
        axisTick: { show: false },
        axisLine: {
          lineStyle: {
            color: '#555'
          }
        },
        axisLabel: {
          color: '#333',
          fontSize: 11,
          fontWeight: 'bold'
        }
      },
      yAxis: {
        type: 'value',
        axisLine: { show: false },
        axisTick: { show: false },
        splitLine: {
          lineStyle: {
            color: '#eee' // Grey lines on white background
          }
        },
        axisLabel: {
          color: '#333',
          fontSize: 11,
          fontWeight: 'bold'
        }
      },
      series: [
        {
          name: 'Jobs',
          type: 'bar',
          barWidth: '40%',
          data: [4, 2, 3, 5],
          itemStyle: {
            color: '#2196F3',
            borderRadius: [2, 2, 0, 0]
          },
          label: {
            show: true,
            position: 'top',
            color: '#000',
            fontWeight: 'bold',
            fontSize: 13
          }
        }
      ]
    };

    myChart.setOption(option);
    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
